site_name: SQL Master Guide
site_description: Полное руководство по изучению SQL
site_author: DaniilGavrin
repo_url: https://github.com/DaniilGavrin/sql-master-guide
repo_name: DaniilGavrin/sql-master-guide

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: blue
      accent: blue
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: blue
      accent: blue

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - abbr
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Основы SQL:
    - Введение: basics/introduction.md
    - SELECT: basics/select.md
    - WHERE: basics/where.md
    - ORDER BY: basics/order-by.md
    - INSERT: basics/insert.md
    - UPDATE: basics/update.md
    - DELETE: basics/delete.md
  - MySQL:
    - Установка и настройка: mysql/installation.md
    - Шпаргалка: mysql/cheatsheet.md
  - PostgreSQL:
    - Установка и настройка: postgresql/installation.md
    - Шпаргалка: postgresql/cheatsheet.md
  - Продвинутые темы:
    - JOIN таблиц: advanced/joins.md
    - Агрегатные функции: advanced/aggregates.md
    - Подзапросы: advanced/subqueries.md
    - Оконные функции: advanced/window-functions.md
    - CTE: advanced/cte.md
    - Индексы и оптимизация: advanced/indexes.md
    - Транзакции: advanced/transactions.md
    - Процедуры и функции: advanced/procedures.md
  - Справочник:
    - SQL команды и типы данных: reference/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DaniilGavrin
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/

copyright: Copyright &copy; 2024 DaniilGavrin
